<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <h1>Painel de Usuário</h1>
    </div>

    <div class="container">
        <h1>Novo usuário</h1>
        <form action="#" class="form">
            <div class="row">
                <label>Usuario:</label>
            </div>

            <div class="row-btm">
                <input class="text-input" type="text" name="" id="">
            </div>

            <div class="row">
                <label>E-mail:</label>
            </div>

            <div class="row-btm">
                <input class="text-input"  type="email" name="" id="">
            </div>

            <div class="row">
                <label>Senha:</label>
            </div>

            <div class="row-btm">
                <input class="text-input"  type="password" name="" id="">
            </div>

            <input class="btn" type="submit" value="Registrar-se">
        </form>
    </div>

    
    <div class="container">
        <h1>Login</h1>
        <form action="#" class="form">
            <div class="row">
                <label>E-mail:</label>
            </div>

            <div class="row-btm">
                <input class="text-input" type="email" name="" id="">
            </div>

            <div class="row">
                <label>Senha:</label>
            </div>

            <div class="row-btm">
                <input class="text-input"  type="password" name="" id="">
            </div>

            <input class="btn" type="submit" value="Entrar">
        </form>
    </div>
</body>
</html>
